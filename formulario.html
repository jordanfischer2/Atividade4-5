<link rel="stylesheet" href="./css/form.css">
<script type="module" src="./js/formulario.js"></script>

    <body>
        <header class="cabecalho">
            <img src="./assets/images/LOGO_HORIZONTAL_COLORIDO2_HOLLZ.png" alt="logo"/>            
            <p>Móveis de alto padrão com ferragens inteligentes</p>
            <a href="index.html">Voltar</a>
        </header>

        <main class="orcamento">
            <form id="form-orcamento" class="formulario">
                <h1>SOLICITAÇÃO DE ORÇAMENTO</h1>
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" required>  
            
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" placeholder="(11)99999-9999"required> 

                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="00000-000" required>

                <div class="linha">
                    <div class="campo-largo">
                        <label for="logradouro">Rua</label>
                        <input type="text" id="logradouro">
                    </div>

                    <div class="campo-curto">
                        <label for="numero">Número</label>
                        <input type="text" id="numero">
                    </div>
                </div>

                <label for="bairro">Bairro</label>
                <input type="text" id="bairro">

                <div class="linha">
                    <div class="campo-largo">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade">
                    </div>

                    <div class="campo-curto">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" maxlength="2">
                    </div>
                </div>

                <button id="botao-orcamento" onclick="mostrarAgradecimento()">Solicitar</button>
                <div id="mensagem-agradecimento"></div>

                <script>
       
                    function mostrarAgradecimento() {
                        const botao = document.getElementById("botao-orcamento");
                        document.getElementById("mensagem-agradecimento").innerText = "Recebemos sua solicitação. Entraremos em contato."
                        botao.style.display = "none";
                    }
                
                </script>
            </form> 
        </main>    

        <footer class="footer">
            <div class="container-footer">
                <div class="coluna-footer">
                    <h3>Links Úteis</h3>
                    <ul>
                        <li><a href="#">Início</a></li>
                        <li><a href="#">Sobre Nós</a></li>
                        <li><a href="#">Serviços</a></li>
                    </ul>
                </div>

                <div class="coluna-footer">
                    <h3>Redes Sociais</h3>
                    <ul>
                        <li><a href="#">Facebook</a></li>
                        <li><a href="#">Instagram</a></li>
                        <li><a href="#">LinkedIn</a></li>
                    </ul>
                </div>
            </div>

            <div class="direitos-autorais">
                <p>&copy; 2026 Hollz Móveis Planejados. Todos os direitos reservados.</p>
            </div>
            
        </footer>
    </body>
